services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_ATOMIZER_WS_URL=ws://localhost:8000/ws/atomizer
      - NEXT_PUBLIC_WORKER_WS_URL=ws://localhost:3001
      - NEXT_PUBLIC_WORKER_URL=http://localhost:3001
    depends_on:
      atomizer:
        condition: service_healthy
    networks:
      - bloom-net

  atomizer:
    build:
      context: ./services/atomizer
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - ANTHROPIC_API_KEY=${CLAUDE_API_KEY}
      - OLLAMA_API_BASE=${OLLAMA_API_BASE}
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - bloom-net

networks:
  bloom-net:
    driver: bridge
